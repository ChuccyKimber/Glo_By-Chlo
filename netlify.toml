<main id="main">

  <section class="page-hero">
    <div class="wrap">
      <span class="eyebrow">Menu &amp; pricing</span>
      <h1>Pick your <span class="chrome twinkle">sparkle</span></h1>
      <p class="lead">Every piece is a certified Swarovski crystal set with dental-grade bond. Prices include placement mapping, prep, application, and aftercare kit.</p>
    </div>
  </section>

  <!-- SIGNATURE COLLECTIONS -->
  <section style="padding-top:1rem">
    <div class="wrap">
      <div class="section-head">
        <h2>Signature <span class="chrome">collections</span></h2>
        <p class="lead">Fully designed multi-gem looks with a set price — no per-gem math, no surprises.</p>
      </div>

      <div class="grid grid-3">
        <article class="card collection card-holo">
          <div class="ph ph-45" data-label="Drop client photo · 4:5" role="img" aria-label="Electric Lagoon — teal butterfly gems with peridot accents"></div>
          <div class="collection-body">
            <span class="sticker aqua">Fairy-coded</span>
            <h3 class="mt-1">Electric Lagoon</h3>
            <p style="color:var(--muted);font-size:.92rem">Teal Swarovski butterflies flanked by peridot rounds, mapped across the upper smile line. Ethereal in daylight, electric under club lighting.</p>
            <ul style="color:var(--muted);font-size:.88rem;padding-left:1.1rem;margin:.6rem 0 0">
              <li>~8 gems · 2 shaped butterflies</li>
              <li>45–60 minute appointment</li>
            </ul>
            <div class="collection-meta">
              <span class="price"><span data-cms="price-lagoon">$185</span><small>set price</small></span>
              <a class="btn btn-ghost" href="book.html">Book it</a>
            </div>
          </div>
        </article>

        <article class="card collection card-holo">
          <div class="ph ph-45" data-label="Drop client photo · 4:5" role="img" aria-label="Cosmic Candy — rainbow crystals along the lower smile line"></div>
          <div class="collection-body">
            <span class="sticker pink">Best seller</span>
            <h3 class="mt-1">Cosmic Candy</h3>
            <p style="color:var(--muted);font-size:.92rem">A full rainbow arc placed tooth by tooth along the lower line, with clear accent clusters up top. Maximum color, zero restraint.</p>
            <ul style="color:var(--muted);font-size:.88rem;padding-left:1.1rem;margin:.6rem 0 0">
              <li>~10 gems · full spectrum</li>
              <li>60 minute appointment</li>
            </ul>
            <div class="collection-meta">
              <span class="price"><span data-cms="price-candy">$225</span><small>set price</small></span>
              <a class="btn btn-ghost" href="book.html">Book it</a>
            </div>
          </div>
        </article>

        <article class="card collection card-holo">
          <div class="ph ph-45" data-label="Drop client photo · 4:5" role="img" aria-label="Bikini Bottom — pastel flower gem clusters"></div>
          <div class="collection-body">
            <span class="sticker acid">Statement</span>
            <h3 class="mt-1">Bikini Bottom</h3>
            <p style="color:var(--muted);font-size:.92rem">Pastel flower clusters on the uppers with a clean crystal line below — a whole underwater garden, placed with jeweler precision.</p>
            <ul style="color:var(--muted);font-size:.88rem;padding-left:1.1rem;margin:.6rem 0 0">
              <li>Full design · flower clusters</li>
              <li>75–90 minute appointment</li>
            </ul>
            <div class="collection-meta">
              <span class="price"><span data-cms="price-bikini">$265</span><small>set price</small></span>
              <a class="btn btn-ghost" href="book.html">Book it</a>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>

  <!-- À LA CARTE -->
  <section style="background:var(--ink-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)">
    <div class="wrap" style="max-width:820px">
      <div class="section-head">
        <h2>À la <span class="chrome">carte</span></h2>
        <p class="lead">Build your own look, one crystal at a time.</p>
      </div>
      <div class="card card-holo">
        <div class="menu">
          <div class="menu-row">
            <div><span class="name">Single Swarovski crystal</span><p class="desc">The classic. One certified crystal in your choice of color, placed to catch light.</p></div>
            <span class="amt" data-cms="price-single">$55</span>
          </div>
          <div class="menu-row">
            <div><span class="name">Additional crystals</span><p class="desc">Each extra round crystal in the same appointment.</p></div>
            <span class="amt" data-cms="price-additional">+$20 ea</span>
          </div>
          <div class="menu-row">
            <div><span class="name">Shaped gems</span><p class="desc">Butterflies, stars, hearts, marquise — statement shapes, priced per piece.</p></div>
            <span class="amt" data-cms="price-shaped">from $70</span>
          </div>
          <div class="menu-row">
            <div><span class="name">Custom design session</span><p class="desc">Bring your Pinterest board. Includes design consult + multi-gem placement map.</p></div>
            <span class="amt" data-cms="price-custom">from $150</span>
          </div>
          <div class="menu-row">
            <div><span class="name">Gentle removal</span><p class="desc">Enamel-safe removal with a finishing polish. Free for gems we placed within 30 days.</p></div>
            <span class="amt" data-cms="price-removal">$20</span>
          </div>
          <div class="menu-row">
            <div><span class="name">Mobile appointment</span><p class="desc">We come to you — home, salon, or event. Within 15 miles of Roseville; custom quote beyond.</p></div>
            <span class="amt" data-cms="price-travel">+$25</span>
          </div>
        </div>
      </div>
      <p class="form-note mt-1">A $20 deposit reserves every appointment and applies toward your total. See <a href="policies.html" style="color:var(--pink)">policies</a> for the fine print.</p>
    </div>
  </section>

  <!-- GOOD TO KNOW -->
  <section>
    <div class="wrap">
      <div class="grid grid-3">
        <div class="card step">
          <span class="step-num">MATERIALS</span>
          <h3>Swarovski, certified</h3>
          <p>Lead-free, precision-cut crystals — never generic glass. Bonded with ISO-class dental composite and LED-cured.</p>
        </div>
        <div class="card step">
          <span class="step-num">LONGEVITY</span>
          <h3>3–12 months of glow</h3>
          <p>Lifespan depends on placement and habits. Follow the <a href="aftercare.html" style="color:var(--pink)">aftercare guide</a> and yours will outlast the trend cycle.</p>
        </div>
        <div class="card step">
          <span class="step-num">GUARANTEE</span>
          <h3>30-day replacement</h3>
          <p>If a gem we placed pops off within 30 days, we replace it free. Just DM us a pic and rebook.</p>
        </div>
      </div>
    </div>
  </section>

  <section class="cta-band">
    <div class="wrap">
      <h2>Found <span class="chrome twinkle">the one?</span></h2>
      <p class="lead" style="margin-inline:auto">Lock in your slot — appointments book out fast around event season.</p>
      <a class="btn btn-primary btn-lg mt-1" href="book.html">Book now</a>
    </div>
  </section>

